# OA — Operational Analytics Configuration
# Auto-generated by `oa init`. Edit freely.

openclaw_home: /Users/ericmr/.openclaw
db_path: data/monitor.db
memory:
  # auto: prefer LanceDB (OpenClaw memory-lancedb-pro) if available, else fallback to legacy file checks
  # lancedb: only use LanceDB
  # legacy: only use file-based checks
  mode: lancedb
  # Rolling window for "memory_discipline". 1=only the day, 7=last 7 days (inclusive)
  window_days: 1

cron_reliability:
  # Exclude internal cron jobs (like OA watchdog) from Cron Reliability metrics.
  exclude_name_prefixes: ["oa-watchdog"]

watchdog:
  # Blacklist management (default allow-all): exclude jobs from auto-rerun by jobId or by name prefix
  blacklist_job_ids: []
  blacklist_name_prefixes: ["oa-watchdog"]

  # Max auto-rerun attempts per (job_id, slot_time)
  max_rerun_attempts: 3
  # Cap reruns per watchdog cycle
  max_reruns_per_cycle: 5
  # Only consider anomalies in this rolling window
  lookback_hours: 6
  # Avoid acting on very recent slots
  min_age_minutes: 5

  # Dispatch policy (after rerun attempts exhausted)
  dispatch_agent_id: "Paul_Operator"
  dispatch_cooldown_hours: 12
  # Default: only plan; execution requires Boss confirmation
  dispatch_mode: "plan_only"  # plan_only|auto_fix_if_safe
